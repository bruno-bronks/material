# Referência da config em /etc/nginx/sites-available/material.bronks.ia.br na VPS.
# Os blocos "managed by Certbot" foram gerados/editados pelo `certbot --nginx` — se for
# recriar do zero, rode o certbot de novo em vez de copiar os caminhos de certificado daqui.

server {
    server_name material.bronks.ia.br;

    location /api/ {
        limit_req zone=material_api burst=5 nodelay;

        proxy_pass http://127.0.0.1:8002/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # /api/chat/stream usa SSE — sem isso, o nginx bufferiza a resposta inteira
        # e o frontend só veria o progresso depois que tudo já tivesse terminado.
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass http://127.0.0.1:3011;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/material.bronks.ia.br/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/material.bronks.ia.br/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = material.bronks.ia.br) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name material.bronks.ia.br;
    return 404; # managed by Certbot
}
