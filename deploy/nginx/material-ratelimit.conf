# /etc/nginx/conf.d/material-ratelimit.conf na VPS.
# Rate limit pro MaterialGPT — /api/chat* chama a API da OpenAI (custo real por requisição).
# 10 req/min por IP, com rajada de 5 sem delay (uso interativo normal não é afetado).
limit_req_zone $binary_remote_addr zone=material_api:10m rate=10r/m;
limit_req_status 429;
